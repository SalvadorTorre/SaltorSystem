name: Deploy Web to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-web-ftp
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'


      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web application
        run: yarn build --configuration production --base-href "/"

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install --yes lftp

      - name: Upload build with explicit FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" -p 21 "$FTP_SERVER" <<'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          # El hosting FTP usa un certificado compartido cuyo nombre no coincide
          # con ftp.grupohierro.net. Conservamos FTPS, pero aceptamos ese certificado.
          set ssl:verify-certificate false
          mirror --reverse --verbose dist/saltor-system/ ./
          bye
          EOF
