<div class="container-fluid caja-layout px-2 px-lg-3 py-2">
  <div class="row g-3 g-lg-4 align-items-start">
    <div class="col-12 d-block d-lg-none">
      <button
        class="btn btn-danger btn-menu-mobile"
        type="button"
        data-bs-toggle="offcanvas"
        data-bs-target="#cajaSidebar"
        aria-controls="cajaSidebar"
      >
        <i class="bi bi-list"></i> Menú Caja
      </button>
    </div>

    <div class="col-lg-3 col-xl-2 d-none d-lg-block caja-sidebar-col">
      <aside class="caja-sidebar shadow-sm">
        <div class="caja-sidebar__header text-white p-3 d-flex align-items-center">
          <i class="bi bi-cash-coin me-2"></i>
          <h5 class="mb-0">Módulo de Caja</h5>
        </div>
        <ul class="nav flex-column caja-sidebar__nav">
          <li class="nav-item" *ngIf="canView('/private/caja/CobroFact')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['CobroFact']"
            >
              <i class="bi bi-receipt me-2"></i>
              <span>Cobro Factura</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/cuadrecaja')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['cuadrecaja']"
            >
              <i class="bi bi-calculator me-2"></i>
              <span>Cuadre Caja</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/reciboingreso')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['reciboingreso']"
            >
              <i class="bi bi-journal-check me-2"></i>
              <span>Recibo de Ingreso</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/cajaenvio')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['cajaenvio']"
            >
              <i class="bi bi-send me-2"></i>
              <span>Caja Envío</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/ControlSalida')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['ControlSalida']"
            >
              <i class="bi bi-truck me-2"></i>
              <span>Control Cobro Factura Choferes</span>
            </a>
          </li>
        </ul>
      </aside>
    </div>

    <div
      class="offcanvas offcanvas-start caja-offcanvas"
      tabindex="-1"
      id="cajaSidebar"
      aria-labelledby="cajaSidebarLabel"
    >
      <div class="offcanvas-header text-white">
        <h5 class="offcanvas-title" id="cajaSidebarLabel">Módulo de Caja</h5>
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body p-0">
        <ul class="nav flex-column caja-sidebar__nav">
          <li class="nav-item" *ngIf="canView('/private/caja/CobroFact')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['CobroFact']"
              data-bs-dismiss="offcanvas"
            >
              <i class="bi bi-receipt me-2"></i>
              <span>Cobro Factura</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/cuadrecaja')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['cuadrecaja']"
              data-bs-dismiss="offcanvas"
            >
              <i class="bi bi-calculator me-2"></i>
              <span>Cuadre Caja</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/reciboingreso')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['reciboingreso']"
              data-bs-dismiss="offcanvas"
            >
              <i class="bi bi-journal-check me-2"></i>
              <span>Recibo de Ingreso</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/cajaenvio')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['cajaenvio']"
              data-bs-dismiss="offcanvas"
            >
              <i class="bi bi-send me-2"></i>
              <span>Caja Envío</span>
            </a>
          </li>
          <li class="nav-item" *ngIf="canView('/private/caja/ControlSalida')">
            <a
              class="nav-link d-flex align-items-center"
              routerLinkActive="active active-link"
              [routerLinkActiveOptions]="{ exact: true }"
              [routerLink]="['ControlSalida']"
              data-bs-dismiss="offcanvas"
            >
              <i class="bi bi-truck me-2"></i>
              <span>Control Cobro Factura Choferes</span>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="col-12 col-lg-9 col-xl-10">
      <div class="caja-main-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
