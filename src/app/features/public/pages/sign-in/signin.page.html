<div
  class="container p-3 p-sm-5"
  style="background-color: white; height: auto; width: 100%; border-radius: 8px"
>
  <div class="row">
    <div class="col text-center">
      <img src="./assets/logo2.png" height="100px" alt="" />
    </div>
  </div>
  <br />

  <form [formGroup]="myFormCreate" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col">
        <label>Usuario</label>
        <input
          type="text"
          (input)="convertToUpperCase($event)"
          class="form-control"
          formControlName="username"
        />
      </div>
    </div>
    <br />
    <div class="row">
      <div class="col">
        <label>Contraseña</label>
        <input
          type="password"
          class="form-control"
          formControlName="userpassword"
          maxlength="4"
        />
      </div>
    </div>
    <br />
    <br />
    <div class="d-grid gap-2">
      <button class="btn btn-primary" type="submit">
        <div
          class="spinner-border text-light"
          role="status"
          style="height: 20px; width: 20px"
          *ngIf="isLoading"
        >
          <span class="visually-hidden">Loading...</span>
        </div>
        <div *ngIf="!isLoading">Entrar</div>
      </button>
    </div>
  </form>

  <div class="apk-download-box">
    <button
      class="btn btn-outline-success w-100"
      type="button"
      (click)="descargarApk()"
      [disabled]="descargandoApk"
    >
      <span
        class="spinner-border spinner-border-sm me-2"
        role="status"
        *ngIf="descargandoApk"
      ></span>
      <i class="bi bi-android2 me-1" *ngIf="!descargandoApk"></i>
      {{ descargandoApk ? 'Buscando APK...' : 'Descargar APK' }}
    </button>
    <small>Descarga siempre la ultima version cargada.</small>
  </div>
</div>
